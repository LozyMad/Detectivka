name: Deploy to Timeweb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy secret
        run: |
          if [ -z "${{ secrets.DEPLOY_SECRET }}" ]; then
            echo "::error::DEPLOY_SECRET is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "DEPLOY_SECRET is set (length: ${#DEPLOY_SECRET} chars)"
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}

      - name: Call deploy webhook on server
        run: |
          echo "Calling deploy endpoint..."
          RESP=$(curl -s -w "\n%{http_code}" -X POST "http://5.42.113.79:3000/api/deploy" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            --connect-timeout 15 --max-time 45) || true
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "Response code: $CODE"
          echo "Response body: $BODY"
          if [ "$CODE" = "200" ]; then
            echo "Deploy OK"
          else
            if [ "$CODE" = "000" ]; then
              echo "::error::Connection failed (000). Server unreachable from GitHub. Check: 1) App running on server (pm2 status). 2) Timeweb firewall: open port 3000 for incoming. 3) Server IP 5.42.113.79 is correct."
            else
              echo "::error::Deploy failed (code $CODE). Check DEPLOY_SECRET and server .env."
            fi
            exit 1
          fi

